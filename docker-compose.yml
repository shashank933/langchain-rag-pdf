services:
  # Single service: FastAPI serves both API and frontend static files
  app:
    image: talapelliwars/ragdemo:latest
    container_name: pdf-rag-app
    ports:
      - "80:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - pdf-rag-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  pdf-rag-network:
    driver: bridge
